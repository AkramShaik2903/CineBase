spring.application.name=cinebase

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cinebase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cinebase}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cinebase123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:my-development-jwt-secret-change-in-production}
jwt.expiration=86400000